name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: 'projects/837056944608/locations/global/workloadIdentityPools/theovenssecret/providers/github-provider'
          service_account: 'github-action-1162900851@project-4eb9ff52-43b8-4ee6-a16.iam.gserviceaccount.com'
          token_format: 'access_token'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Install dependencies
        run: npm install

      - name: Build and Push Docker image
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/the-ovens-secret/the-ovens-secret/nextjs-app:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/the-ovens-secret/the-ovens-secret/nextjs-app:latest \
            .
          docker push us-central1-docker.pkg.dev/the-ovens-secret/the-ovens-secret/nextjs-app:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/the-ovens-secret/the-ovens-secret/nextjs-app:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy the-ovens-secret \
            --image=us-central1-docker.pkg.dev/the-ovens-secret/the-ovens-secret/nextjs-app:${{ github.sha }} \
            --platform=managed \
            --region=us-central1 \
            --allow-unauthenticated \
            --port=3000 \
            --project=the-ovens-secret

      - name: Deploy Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project=the-ovens-secret
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}